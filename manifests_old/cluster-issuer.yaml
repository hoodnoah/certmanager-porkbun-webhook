apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    email: hood.noah@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-key
    solvers:
    - dns01:
        webhook:
          groupName: acme.noah-hood.io
          solverName: porkbun-solver
          config:
            apiKeySecretRef:
              name: porkbun-credentials
              key: PORKBUN_API_KEY
            secretKeySecretRef:
              name: porkbun-credentials
              key: PORKBUN_SECRET_KEY
            caBundle: $(base64 -w0 tls/cert.pem)
            apiURL: https://porkbun-webhook.cert-manager.svc
          