name: release

on:
  release:
    types: [published]
  # Alternative: trigger directly on tag push, which removes the need to
  # create a Gitea release object after `just release <version>` tags:
  #
  # on:
  #   push:
  #     tags:
  #       - "[0-9]+.[0-9]+.[0-9]+"

env:
  GITEA_REGISTRY: gitea.k3s.noah-hood.io
  GITEA_IMAGE: gitea.k3s.noah-hood.io/hoodn/certmanager-porkbun-webhook
  GHCR_IMAGE: ghcr.io/hoodnoah/certmanager-porkbun-webhook

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Gitea container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITEA_REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.PACKAGE_TOKEN }}

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: hoodnoah
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GITEA_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          # {{version}} normalizes the tag (strips a leading "v" if present),
          # so this stays consistent with the justfile's unprefixed tags
          # (e.g. 0.1.0 -> 0.1.0, 0.1) while tolerating v-prefixed ones.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.GITEA_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.GITEA_IMAGE }}:cache,mode=max
